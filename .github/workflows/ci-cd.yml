name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - project/dev
      - master-to-do

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/project/dev' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t myapp:latest .

  push:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: docker push myapp:latest

  deploy-staging:
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/project/dev'
    steps:
      - name: Deploy to Staging
        run: echo "Deploying to Staging Environment"

  deploy-prod:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: push
    steps:
      - name: Deployment Approval
        uses: shmuelhizmi/gha-manual-approval@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPROVE_LABEL: 'approve-prod'
          approvers: '["your-github-username"]'

      - name: Deploy to Production
        run: echo "Deploying to Production Environment"

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-prod]
    steps:
      - name: Send Notification
        run: |
          echo "Notification: Deployment Successful"
