name: CI/CD Pipeline

on:
  push:
    branches:
      - todowithai/dev
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Python tests
      run: python -m unittest discover

    - name: Set up Node
      uses: actions/setup-node@v3
      with:
        node-version: '16'

    - name: Install Node dependencies
      run: npm install

    - name: Run Node tests
      run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: docker build -t todowithai:latest .

  push:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker image
      run: |
        docker tag todowithai:latest ${{ secrets.DOCKER_USERNAME }}/todowithai:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/todowithai:${{ github.sha }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/todowithai/dev'
    steps:
    - name: Deploy to Staging
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
        STAGING_SERVER: ${{ secrets.STAGING_SERVER }}
      run: |
        echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
        ssh -o StrictHostKeyChecking=no $STAGING_SERVER "docker pull ${{ secrets.DOCKER_USERNAME }}/todowithai:${{ github.sha }} && docker-compose -f docker-compose.staging.yml up -d"

  deploy-prod:
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://todowithai.com
    steps:
    - name: Deploy to Production
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
        PROD_SERVER: ${{ secrets.PROD_SERVER }}
      run: |
        echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
        ssh -o StrictHostKeyChecking=no $PROD_SERVER "docker pull ${{ secrets.DOCKER_USERNAME }}/todowithai:${{ github.sha }} && docker-compose -f docker-compose.prod.yml up -d"

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-prod]
    steps:
    - name: Notify
      if: needs.deploy-staging.result == 'success'
      run: |
        echo "Deployment to staging successful. Notifying team."
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    - name: Notify
      if: needs.deploy-prod.result == 'success'
      run: |
        echo "Deployment to production successful. Notifying team."
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}