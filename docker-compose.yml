version: '3.8'

services:
  user-service:
    image: syhionce/user-service:latest
    restart: always
    env_file: .env
    depends_on:
      - mongodb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - user_data:/usr/src/app/data

  auth-service:
    image: syhionce/auth-service:latest
    restart: always
    env_file: .env
    depends_on:
      - mongodb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - auth_data:/usr/src/app/data

  frontend:
    image: nginx:latest
    restart: always
    depends_on:
      - user-service
      - auth-service
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongodb:
    image: mongo:latest
    restart: always
    env_file: .env
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis-cache:
    image: redis:latest
    restart: always
    volumes:
      - cache_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  notification-queue:
    image: syhionce/notification-queue:latest
    restart: always
    env_file: .env
    depends_on:
      - redis-cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4002/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  user_data:
  auth_data:
  mongo_data:
  cache_data: