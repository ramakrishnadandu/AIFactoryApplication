version: '3.8'

services:
  user_service:
    image: user-service:latest
    env_file: 
      - .env
    volumes:
      - user_service_data:/app/data
    depends_on:
      - user_db
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  greeting_service:
    image: greeting-service:latest
    env_file: 
      - .env
    volumes:
      - greeting_service_data:/app/data
    depends_on:
      - cache_service
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  email_service:
    image: email-service:latest
    env_file: 
      - .env
    volumes:
      - email_service_data:/app/data
    depends_on:
      - notification_queue
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  user_db:
    image: postgres:latest
    env_file: 
      - .env
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 30s
      timeout: 10s
      retries: 5

  notification_queue:
    image: redis:latest
    volumes:
      - notification_queue_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  cache_service:
    image: redis:latest
    volumes:
      - cache_service_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - user_service
      - greeting_service
      - email_service
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  user_service_data:
  greeting_service_data:
  email_service_data:
  user_db_data:
  notification_queue_data:
  cache_service_data: